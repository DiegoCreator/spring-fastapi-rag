<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG app</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <div class="message ai-message">Hello! How can I help you today?</div>
      </div>

      <form class="chat-input-area" id="chatForm">
        <input
          type="text"
          id="userInput"
          class="chat-input"
          placeholder="Type your message here..."
          autocomplete="off"
          required
        />
        <button type="submit" class="send-btn">Send</button>
      </form>
      <label for="uploadInput" id="uploadLabel" class="custom-file-button"
        >Choose .txt, .md, .docx, or .pdf file</label
      >
      <input
        type="file"
        id="uploadInput"
        class="file-input-hidden"
        accept=".txt,.pdf,.md,.docx"
      />
      <div id="status"></div>
    
    <div id="sidebar">
      <h3 onClick="window.location.href='http://localhost:3000'" class="newChat-btn">New chat</h3>
      <div class="sidebar-section">
        <h3>Chats</h3>
        <div id="chatList"></div>
      </div>
      <div class="sidebar-section">
        <h3>Files</h3>
        <div id="documentList"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
